# Master Metadata Schema
# Schema for releases-master.yaml containing GitHub facts with format corrections only
# Version: 3.1.0
#
# Changes in 3.1.0:
# - Renamed meta_release value "None (Sandbox)" to "Independent" for releases outside
#   meta-release cycles
#
# Changes in 3.0.0 (ADR-0004: Native Release Metadata Adoption):
# - Removed apis[].file_name (no downstream consumers, not in native metadata)
# - Made apis[].api_name required (primary API identifier after file_name removal)
# - Added src_commit_sha at release level (from native metadata)
# - Added dependencies at release level (from native metadata)
# - Redefined apis[].commonalities: now derived from release-level dependency for native releases
# - Updated commonalities pattern to accept pre-release semver extensions
#
# Changes in 2.1.0:
# - Added optional repository_archived field to releases and repositories (issue #147)
#   Only present when true. Mirrors the superseded pattern for archived API repositories.
#
# Changes in 2.0.0:
# - Renamed 'version' to 'api_version' in APIs array (per issue #69 property alignment)
# - Renamed 'title' to 'api_title' in APIs array (per issue #69 property alignment)
#
# Changes in 1.1.0:
# - Added release_type field to releases (pre-release-alpha, pre-release-rc, public-release, maintenance-release)
# - Added repositories array with minimal release reference pointers (latest_public_release, newest_pre_release)
# - Extended version pattern to support pre-release extensions (-alpha.N, -rc.N)

$schema: http://json-schema.org/draft-07/schema#
title: CAMARA Master Metadata
description: Schema for master release metadata with format corrections applied
type: object
required:
  - metadata
  - releases

properties:
  metadata:
    type: object
    description: Metadata about the collection process
    required:
      - last_updated
      - last_checked
      - workflow_version
      - schema_version
    properties:
      last_updated:
        type: string
        format: date-time
        description: When data was last modified
      last_checked:
        type: string
        format: date-time
        description: When repositories were last scanned
      workflow_version:
        type: string
        pattern: "^\\d+\\.\\d+\\.\\d+$"
        description: Version of the workflow that generated this data
      schema_version:
        type: string
        pattern: "^\\d+\\.\\d+\\.\\d+$"
        description: Version of this schema

  releases:
    type: array
    description: List of all releases across all repositories
    items:
      type: object
      required:
        - repository
        - release_tag
        - release_date
        - meta_release
        - github_url
        - apis
      properties:
        repository:
          type: string
          pattern: "^[A-Za-z][A-Za-z0-9-]*$"
          description: GitHub repository name

        release_tag:
          type: string
          pattern: "^r\\d+\\.\\d+$"
          description: Release tag in rX.Y format

        release_date:
          type: string
          format: date-time
          description: ISO 8601 release timestamp

        meta_release:
          type: string
          description: Assigned meta-release cycle from configuration
          examples: ["Fall24", "Spring25", "Fall25", "Independent", "None"]

        github_url:
          type: string
          format: uri
          pattern: "^https://github\\.com/camaraproject/.*"
          description: Direct link to GitHub release

        release_type:
          type: string
          enum:
            - pre-release-alpha
            - pre-release-rc
            - public-release
            - maintenance-release
          description: |
            Classification of the release based on API versions and position in release cycle.
            - pre-release-alpha: GitHub prerelease with API versions containing -alpha extension
            - pre-release-rc: GitHub prerelease with API versions containing -rc extension
            - public-release: First non-prerelease in a release cycle (rX)
            - maintenance-release: Subsequent non-prereleases in the same cycle

        src_commit_sha:
          type: ["string", "null"]
          pattern: "^[a-f0-9]{40}$"
          description: |
            Full 40-character commit SHA from the base branch where the snapshot was created.
            Present for releases with native release-metadata.yaml. Null for legacy releases.

        dependencies:
          type: ["object", "null"]
          description: |
            Release-level dependency references from native release-metadata.yaml.
            Present for releases created by the release automation. Null for legacy releases.
          properties:
            commonalities_release:
              type: string
              description: Commonalities release tag with resolved semantic version
            identity_consent_management_release:
              type: string
              description: ICM release tag with resolved semantic version

        repository_archived:
          type: boolean
          description: |
            True when the source repository has been archived on GitHub.
            Only present when true (same pattern as 'superseded').
            Archived releases are included in all reports without filtering.

        apis:
          type: array
          description: API specifications in this release
          minItems: 1
          items:
            type: object
            required:
              - api_name
              - api_version
            properties:
              api_name:
                type: string
                pattern: "^[a-z][a-z0-9-]*$"
                description: |
                  API name extracted from server URL (legacy) or from native metadata.
                  Format corrections applied (lowercase).

              api_version:
                type: string
                pattern: "^\\d+\\.\\d+\\.\\d+(-[a-z]+\\.\\d+)?$"
                description: |
                  Semantic version with format corrections applied.
                  'v' prefix is removed if present (v0.11.0 → 0.11.0).
                  Pre-release extensions follow pattern: X.Y.Z-alpha.N or X.Y.Z-rc.N

              api_title:
                type: ["string", "null"]
                description: Human-readable API title from OpenAPI spec or native metadata

              commonalities:
                type: ["string", "null"]
                pattern: "^\\d+\\.\\d+(?:\\.\\d+(?:-[a-z]+\\.\\d+)?)?$"
                description: |
                  CAMARA Commonalities version as string.
                  For legacy releases: from x-camara-commonalities in OpenAPI spec (e.g., "0.4").
                  For native releases: derived from dependencies.commonalities_release (e.g., "1.3.0").

  repositories:
    type: array
    description: |
      All CAMARA API repositories with quick-reference release pointers.
      Minimal data focused on release tracking; comprehensive repository metadata is in a separate workflow.
    items:
      type: object
      required:
        - repository
        - github_url
      properties:
        repository:
          type: string
          pattern: "^[A-Za-z][A-Za-z0-9-]*$"
          description: GitHub repository name

        github_url:
          type: string
          format: uri
          pattern: "^https://github\\.com/camaraproject/.*"
          description: URL to the GitHub repository

        latest_public_release:
          type: ["string", "null"]
          pattern: "^r\\d+\\.\\d+$"
          description: |
            Tag of the most recent public-release or maintenance-release.
            Null if repository has no public releases yet.

        newest_pre_release:
          type: ["string", "null"]
          pattern: "^r\\d+\\.\\d+$"
          description: |
            Tag of the newest pre-release, only set if:
            - Newer than latest_public_release (same cycle rX.Y+1 or next cycle rX+1.Y), OR
            - latest_public_release is null (repo has only pre-releases)
            Null if no relevant pre-release exists.

        repository_archived:
          type: boolean
          description: |
            True when the repository has been archived on GitHub.
            Only present when true. Archived repos appear in the list
            but cannot accept PRs (campaigns must skip them).